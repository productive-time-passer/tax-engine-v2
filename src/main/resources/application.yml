spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/tax_engine
    username: tax_user
    password: tax_password
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

fact:
  pipeline:
    idempotency-enabled: true
    retry-attempts: 3
